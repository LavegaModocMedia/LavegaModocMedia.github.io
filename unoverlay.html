<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: black;
  }

  .viewport {
    width: 1280px;   /* your desired fixed size */
    height: 720px;
    transform-origin: top left;
    position: absolute;
    top: 0;
    left: 0;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
</style>
</head>
<body>

<div class="viewport" id="vp">
  <iframe src="https://lavegamodocmedia.github.io/unoverlay.html"></iframe>
</div>

<script>
  function scaleToFit() {
    const vp = document.getElementById('vp');
    const scaleX = window.innerWidth / 1280;
    const scaleY = window.innerHeight / 720;
    const scale = Math.min(scaleX, scaleY);

    vp.style.transform = `scale(${scale})`;
  }

  window.addEventListener('resize', scaleToFit);
  scaleToFit();
</script>

</body>
</html>
