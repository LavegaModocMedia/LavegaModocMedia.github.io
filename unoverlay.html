    html, body {
      margin: 0;

      overflow: hidden; /* 🔑 hides anything outside viewport */

    }

    iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 120vw;   /* 🔑 make it bigger than screen */
      height: 400vh;  /* 🔑 extend beyond screen */
      border: none;
    }
  </style>
</head>
