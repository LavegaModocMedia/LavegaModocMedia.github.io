<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Uno Overlay Dock</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #000;
  }

  .container {
    position: fixed;
    inset: 0;
    overflow: hidden;
  }

  iframe {
    position: absolute;
    top: -80px;   /* adjust to crop top ads */
    left: 0;
    width: 100%;
    height: calc(100% + 120px); /* compensate for crop */
    border: none;
  }
</style>
</head>
<body>

<div class="container">
  <iframe src="https://lavegamodocmedia.github.io/unoverlay.html"></iframe>
</div>

</body>
</html>
